<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowUp AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#F472B6",
              "secondary": "#6b7280",
              "surface": "#ffffff",
              "surface-container-low": "#fafafa",
              "surface-container-high": "#f5f5f5",
              "on-surface": "#1a1c1c",
              "on-primary": "#ffffff",
              "primary-container": "#1b1b1b",
              "outline-variant": "#c4c7c7",
              "secondary-container": "#fdf2f8",
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.6s ease-out both',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
        }
        .serif, .font-serif { font-family: 'Noto Serif', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .editorial-shadow { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body class="bg-white text-on-surface">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
